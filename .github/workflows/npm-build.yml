name: Node.js Package

on:
  release:
    types: [created]
  # 建议加上 push 触发，方便你在正式 Release 前测试 build 是否成功
  push:
    branches: [main] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          # 确保获取完整的 git 历史，有时对 LFS 这里的 fetch-depth 有要求
          fetch-depth: 0

      # 【关键修正】显式拉取所有子模块的 LFS 文件
      - name: Pull LFS objects in submodules
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 开启缓存，加快后续构建速度

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build