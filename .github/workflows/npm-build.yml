name: Node.js Package

on:
  release:
    types: [created]
  # 建议加上 push 触发，方便你在正式 Release 前测试 build 是否成功
  push:
    branches: [main] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: Deep LFS Pull for Submodules
        run: |
          # 这一步确保子模块不仅代码到位，LFS 指针也被替换为实体文件
          git submodule update --init --recursive
          git submodule foreach --recursive 'git lfs install --local && git lfs pull'

      - name: Verify Model Files
        run: |
          # 使用通配符检查所有模型文件
          for file in $(find public/models -name "*.bin" -o -name "*.onnx"); do
            size=$(stat -c%s "$file")
            echo "Checking $file: $size bytes"
            if [ $size -lt 1000 ]; then
              echo "❌ Error: $file is a pointer file!"
              exit 1
            fi
          done

      - name: Install & Build
        run: |
          npm install
          npm run build
          
          mkdir -p dist/models/whisper-tiny/onnx
          cp public/models/whisper-tiny/onnx/encoder_model.onnx dist/models/whisper-tiny/onnx/
          cp public/models/whisper-tiny/onnx/decoder_model_merged.onnx dist/models/whisper-tiny/onnx/
          
          echo "✅ Verified: Models copied to dist"
          ls -R dist/models

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/  # 这里指向你 build 出来的文件夹
          retention-days: 1 # 自动保留 1 天