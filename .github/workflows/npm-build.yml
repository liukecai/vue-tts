name: Node.js Package

on:
  release:
    types: [created]
  # 建议加上 push 触发，方便你在正式 Release 前测试 build 是否成功
  push:
    branches: [main] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: Verify Model Files
        run: |
          # 使用通配符检查所有模型文件
          for file in $(find submodules -name "*.bin" -o -name "*.onnx"); do
            size=$(stat -c%s "$file")
            echo "Checking $file: $size bytes"
            if [ $size -lt 1000 ]; then
              echo "❌ Error: $file is a pointer file!"
              exit 1
            fi
          done

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/  # 这里指向你 build 出来的文件夹
          retention-days: 1 # 自动保留 1 天